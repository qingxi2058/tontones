<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    width: 1200px; height: 630px; overflow: hidden;
    background: #0c0a1e;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
    display: flex; align-items: center; justify-content: center;
    position: relative;
  }
  .orb {
    position: absolute; border-radius: 50%; filter: blur(90px); opacity: 0.5;
  }
  .orb-1 { width: 600px; height: 600px; background: #6c2bd9; top: -180px; left: -160px; }
  .orb-2 { width: 500px; height: 500px; background: #1e40c9; bottom: -180px; right: -120px; }
  .orb-3 { width: 360px; height: 360px; background: #c026d3; top: 30%; left: 50%; }

  .content {
    position: relative; z-index: 10;
    display: flex; align-items: center;
    gap: 80px; padding: 0 80px;
    width: 100%;
  }

  .left { flex: 1; }

  .badge {
    display: inline-block;
    background: linear-gradient(90deg, #c8ff00, #00e5ff);
    color: #0c0a1e;
    font-size: 13px; font-weight: 800;
    padding: 5px 16px; border-radius: 20px;
    letter-spacing: 1.5px; text-transform: uppercase;
    margin-bottom: 20px;
  }

  .title {
    font-size: 80px; font-weight: 800;
    line-height: 0.92; letter-spacing: -3px;
    color: white;
    margin-bottom: 10px;
  }
  .title em {
    font-style: normal;
    background: linear-gradient(90deg, #c8ff00 0%, #00e5ff 50%, #ff44cc 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }

  .desc {
    font-size: 20px; color: rgba(255,255,255,0.55);
    line-height: 1.5; margin-top: 18px;
    font-weight: 400; max-width: 420px;
  }

  .domain {
    margin-top: 32px;
    font-size: 16px; font-weight: 700;
    color: #c8ff00; letter-spacing: 0.5px;
    display: flex; align-items: center; gap: 8px;
  }
  .domain-dot {
    width: 8px; height: 8px; border-radius: 50%;
    background: #c8ff00;
    box-shadow: 0 0 10px #c8ff00;
  }

  .right {
    display: flex; flex-direction: column; gap: 14px; flex-shrink: 0;
  }

  .swatch-row {
    display: flex; gap: 14px;
  }

  .swatch {
    width: 88px; height: 88px;
    border-radius: 20px;
    border: 2px solid rgba(255,255,255,0.15);
    box-shadow: 0 8px 32px rgba(0,0,0,0.4);
    position: relative;
    overflow: hidden;
  }
  .swatch::after {
    content: '';
    position: absolute; inset: 0;
    background: linear-gradient(135deg, rgba(255,255,255,0.15) 0%, transparent 60%);
  }

  .swatch-label {
    font-size: 11px; color: rgba(255,255,255,0.3);
    text-align: center; margin-top: 4px;
    font-weight: 500;
  }

  .vs-badge {
    display: flex; align-items: center; justify-content: center;
    width: 36px; height: 36px; border-radius: 50%;
    background: rgba(255,255,255,0.08);
    border: 1px solid rgba(255,255,255,0.12);
    font-size: 14px; color: rgba(255,255,255,0.4);
    font-weight: 700; align-self: center;
  }

  .score-display {
    text-align: center; margin-top: 4px;
  }
  .score-big {
    font-size: 52px; font-weight: 800; letter-spacing: -2px;
    background: linear-gradient(90deg, #c8ff00, #00e5ff);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    line-height: 1;
  }
  .score-sub {
    font-size: 13px; color: rgba(255,255,255,0.35);
    font-weight: 500;
  }
</style>
</head>
<body>
  <div class="orb orb-1"></div>
  <div class="orb orb-2"></div>
  <div class="orb orb-3"></div>

  <div class="content">
    <div class="left">
      <div class="badge">Color Memory Game</div>
      <div class="title">Your eyes<br><em>never lie.</em></div>
      <div class="desc">Five legendary shades from pop culture. Three sliders. Zero hints. How close can you get?</div>
      <div class="domain">
        <div class="domain-dot"></div>
        toontones.net — Free to play
      </div>
    </div>

    <div class="right">
      <div class="swatch-row">
        <div>
          <div class="swatch" style="background:#FFD700"></div>
          <div class="swatch-label">⚡ Target</div>
        </div>
        <div class="vs-badge">→</div>
        <div>
          <div class="swatch" style="background:#F0C800"></div>
          <div class="swatch-label">🎨 Yours</div>
        </div>
      </div>
      <div class="swatch-row">
        <div>
          <div class="swatch" style="background:#FF2B2B"></div>
          <div class="swatch-label">❤️ Target</div>
        </div>
        <div class="vs-badge">→</div>
        <div>
          <div class="swatch" style="background:#E82020"></div>
          <div class="swatch-label">🎨 Yours</div>
        </div>
      </div>
      <div class="score-display">
        <div class="score-big">8.4</div>
        <div class="score-sub">/ 10 color accuracy</div>
      </div>
    </div>
  </div>
</body>
</html>
